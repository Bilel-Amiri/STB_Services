<div class="credit-form-container">
  <h2>Create New Credit</h2>
  
  <form (ngSubmit)="createCredit()" class="credit-form">
    <div class="form-group">
      <label for="amount">Amount (€)</label>
      <input type="number" id="amount" 
             [(ngModel)]="creditData.amount" 
             name="amount" 
             min="1" 
             required
             class="form-control">
    </div>

    <div class="form-group">
      <label for="duration">Duration (Months)</label>
      <input type="number" id="duration" 
             [(ngModel)]="creditData.durationMonths" 
             name="durationMonths" 
             min="1" 
             max="360"
             required
             class="form-control">
    </div>

    <div class="form-group">
      <label for="interest">Interest Rate (%)</label>
      <input type="number" id="interest" 
             [(ngModel)]="creditData.interestRate" 
             name="interestRate" 
             min="0" 
             max="30" 
             step="0.01"
             required
             class="form-control">
    </div>

    <button type="submit" class="submit-btn" [disabled]="isLoading">
      <span *ngIf="!isLoading">Create Credit</span>
      <span *ngIf="isLoading">Processing...</span>
    </button>
  </form>

  <div *ngIf="successMessage" class="alert success">
    {{ successMessage }}
  </div>

  <div *ngIf="errorMessage" class="alert error">
    {{ errorMessage }}
  </div>
</div>
